‎<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompareIt - Settings</title>
    <link rel="stylesheet" href="settings.css">
</head>
<body>

    <header>
        <div class="back-btn" onclick="history.back()">⬅ Back</div>
        <h1>Settings</h1>
    </header>

    <div class="settings-container">
        <div class="profile-box">
            <h2>Profile Details</h2>
            <hr>
            <p><strong>Name:</strong> <span id="display-name">Loading...</span></p>

            <div id="extra-details">
                <p><strong>Age:</strong> <span id="display-age"></span></p>
                <p><strong>Gender:</strong> <span id="display-gender"></span></p>
                <p><strong>Email:</strong> <span id="display-email"></span></p>
            </div>
        </div>

        <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>

    <script src="settings.js"></script>
</body>
</html>
