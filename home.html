<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompareIt</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

    <header>
        <h2 class="logo">CompareIt</h2>
        <button id="settings-btn">⚙️</button>
    </header>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search products...">
    </div>

    <div class="categories">
        <button class="cat-btn active">All</button>
        <button class="cat-btn">Food</button>
        <button class="cat-btn">Electronics</button>
        <button class="cat-btn">Drinks</button>
    </div>

    <button id="compare-main-btn" class="compare-trigger hidden">Compare 2 Products</button>

    <div id="product-list" class="grid-container"></div>
    <div id="scroll-anchor"></div>

    <div id="details-overlay" class="overlay hidden">
        <div class="overlay-content">
            <span class="close-btn" onclick="closeOverlay('details-overlay')">&times;</span>
            <div id="details-body"></div>
        </div>
    </div>

    <div id="compare-overlay" class="overlay hidden">
        <div class="overlay-content table-container">
            <div class="compare-header">
                <h3>Comparison</h3>
                <span class="close-btn" onclick="closeOverlay('compare-overlay')">&times;</span>
            </div>
            <table id="compare-table">
                </table>
        </div>
    </div>

    <script src="home.js"></script>
</body>
</html>
