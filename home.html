<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompareIt - Home</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

    <header>
        <div class="logo">CompareIt</div>
        <div class="icons">
            <button id="settings-btn">⚙️</button>
        </div>
    </header>

    <input type="text" id="search-input" placeholder="Search products (e.g. Milk, Chocolate)...">

    <div id="loading" class="hidden">Loading...</div>

    <div id="limit-message" class="hidden limit-message">
        API rate limit reached. Please try again later.
    </div>

    <h2 class="section-title">All Food</h2>

    <div id="product-list">
        <p>Searching for products...</p>
    </div>

    <div id="scroll-anchor" style="height: 20px;"></div>

    <div id="product-details" class="hidden">
        <hr>
        <h2>Product Details</h2>
        <img id="detail-img" src="" alt="product Image" style="max-width: 200px; display: block; margin: auto;">
        <h3 id="detail-name"></h3>
        <p id="detail-brand"></p>
        <p id="detail-price"></p>
        <p id="detail-ingredients"></p>

        <div class="api-credit">
            <p>Data provided by <strong>Open Food Facts</strong></p>
            <p><a href="https://world.openfoodfacts.org" target="_blank">Visit API</a></p>
        </div>
    </div>

    <footer>
        <p>CompareIt | Powered by Open Food Facts API</p>
    </footer>

    <script src="home.js"></script>
</body>
</html>
